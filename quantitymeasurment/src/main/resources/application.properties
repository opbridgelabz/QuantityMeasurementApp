spring.application.name=quantitymeasurment
# Application Configuration
# Database Configuration - MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/qmdb
spring.datasource.username=root
spring.datasource.password=ASDF1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

#
## JWT Configuration
#jwt.secret=mySuperSecretKeyForJWTThatIsAtLeast32CharactersLong123
#jwt.expiration=86400000

# Optional: Server Configuration
server.port=8888

# Optional: Logging Configuration
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.bridgelabz.quantitymeasurement=DEBUG